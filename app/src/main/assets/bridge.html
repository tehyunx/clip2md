<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="turndown.js"></script>
<script src="turndown-plugin-gfm.js"></script>
<script src="marked.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 12px; line-height: 1.5; word-wrap: break-word; }
  img { max-width: 100%; height: auto; }
  table { border-collapse: collapse; width: 100%; }
  table, th, td { border: 1px solid #ccc; }
  th, td { padding: 6px 8px; }
  pre { white-space: pre-wrap; background: #f2f2f2; padding: 8px; border-radius: 4px; }
</style>
<script>
var turndownService = new TurndownService({
  headingStyle: 'atx',
  codeBlockStyle: 'fenced',
  hr: '---',
  bulletListMarker: '-'
});
if (typeof turndownPluginGfm !== 'undefined') {
  turndownService.use(turndownPluginGfm.gfm);
}

function fixLazyImages(root) {
  var imgs = root.querySelectorAll('img');
  for (var i = 0; i < imgs.length; i++) {
    var img = imgs[i];
    var src = img.getAttribute('src') || '';
    var looksReal = src && !src.startsWith('data:image/gif') && !/^data:image\/(png|svg)/.test(src.slice(0, 30)) || /^https?:/.test(src);
    if (!src || !looksReal) {
      var candidates = ['data-src', 'data-original', 'data-lazy-src', 'data-actualsrc'];
      for (var c = 0; c < candidates.length; c++) {
        var v = img.getAttribute(candidates[c]);
        if (v) { img.setAttribute('src', v); break; }
      }
      if (!img.getAttribute('src')) {
        var srcset = img.getAttribute('data-srcset') || img.getAttribute('srcset');
        if (srcset) {
          var first = srcset.split(',')[0].trim().split(' ')[0];
          if (first) img.setAttribute('src', first);
        }
      }
    }
  }
}

function convertHtml(html) {
  try {
    var container = document.createElement('div');
    container.innerHTML = html;
    fixLazyImages(container);
    return turndownService.turndown(container.innerHTML);
  } catch (e) {
    return 'ERROR: ' + e.message;
  }
}

function renderPreview(markdown) {
  try {
    document.body.innerHTML = marked.parse(markdown);
  } catch (e) {
    document.body.innerText = 'ERROR: ' + e.message;
  }
}
</script>
</head>
<body></body>
</html>
